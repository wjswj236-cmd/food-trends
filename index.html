                var wordHtml = '<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40"><head><meta charset="utf-8"><style>body{font-family:Meiryo,sans-serif;font-size:10.5pt;line-height:1.6;}h1,h2,h3{font-weight:bold;}table{border-collapse:collapse;}td,th{border:1px solid #999;padding:4px 8px;}</style></head><body>' + htmlContent + '</body></html>';
                var blob = new Blob([wordHtml], { type: 'application/msword' });
                this.downloadBlob(blob, filename);
            },
            generateXlsx: function(content, filename) {
                if (typeof XLSX === 'undefined') { alert('SheetJSライブラリの読み込みに失敗しました'); return; }
                var wb = XLSX.utils.book_new();
                var lines = content.split('\n');
                var tableStart = -1;
                var headers = [];
                var rows = [];
                for (var i = 0; i < lines.length; i++) {
                    var l = lines[i].trim();
                    if (l.startsWith('|') && l.endsWith('|')) {
                        if (tableStart === -1) { tableStart = i; headers = l.split('|').map(function(c){return c.trim();}).filter(Boolean); }
                        else if (l.replace(/[|:\- ]/g,'').length === 0) { continue; }
                        else { rows.push(l.split('|').map(function(c){return c.trim();}).filter(Boolean)); }
                    }
                }
                var ws;
                if (headers.length > 0) {
                    ws = XLSX.utils.aoa_to_sheet([headers].concat(rows));
                } else {
                    var data = lines.filter(function(l){return l.trim();}).map(function(l){return [l.replace(/^#+\s*/,'').replace(/\*\*/g,'')];});
                    ws = XLSX.utils.aoa_to_sheet(data);
                }
                XLSX.utils.book_append_sheet(wb, ws, 'データ');
                var wbout = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
                var blob = new Blob([wbout], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
                this.downloadBlob(blob, filename);
            },
            generatePptx: function(content, filename) {
                if (typeof PptxGenJS === 'undefined') { alert('PptxGenJSライブラリの読み込みに失敗しました'); return; }
                var pptx = new PptxGenJS();
                pptx.layout = 'LAYOUT_WIDE';
                var slideBlocks = content.split(/(?=\n#{1,2} )/);
                if (slideBlocks.length <= 1) {
                    var sl = pptx.addSlide();
                    var plain = content.replace(/\*\*/g,'').replace(/^#+\s*/gm,'').replace(/^[-*]\s*/gm,'• ');
                    sl.addText(plain.substring(0, 600), { x:0.5, y:0.5, w:12, h:6, fontSize:14, fontFace:'Meiryo' });
                } else {
                    slideBlocks.forEach(function(block) {
                        var lines = block.trim().split('\n');
                        var titleLine = lines[0].replace(/^#+\s*/,'').trim();
                        var bodyLines = lines.slice(1).join('\n').replace(/\*\*/g,'').replace(/^[-*]\s*/gm,'• ').trim();
                        if (!titleLine) return;
                        var sl = pptx.addSlide();
                        sl.addText(titleLine, { x:0.5, y:0.3, w:12, h:1.0, fontSize:24, bold:true, fontFace:'Meiryo', color:'1a1a2e' });
                        if (bodyLines) {
                            sl.addText(bodyLines.substring(0, 800), { x:0.5, y:1.5, w:12, h:5.0, fontSize:14, fontFace:'Meiryo', valign:'top' });
                        }
                    });
                }
                pptx.write({ outputType: 'blob' }).then(function(blob) {
                    window.FILE_UTILS.downloadBlob(blob, filename);
                });
            },
            getFilename: function(type) {
                var now = new Date();
                var ts = now.getFullYear() + ('0'+(now.getMonth()+1)).slice(-2) + ('0'+now.getDate()).slice(-2);
                var exts = { docx: 'Trend_Report_' + ts + '.doc', xlsx: 'Trend_Data_' + ts + '.xlsx', pptx: 'Trend_Slides_' + ts + '.pptx' };
                return exts[type] || 'file';
            }
        };

            const suggestRegex = /### ?(提案プロンプト|選択肢) *\r?\n([\s\S]*)/;

                        .join('\n')
                        .replace(/\n{3,}/g, '\n\n')
                        .trim();
                }
            }

            return { mainText, suggestions, suggestionType };

        // 2. メインチャットエリア
        const ChatArea = ({ apiKey, theme }) => {

            // 通常のメッセージ送信（分析実行）
            const handleSend = async (textToSubmit = input) => {

                const userText = textToSubmit;
                setInput('');
                const newMessages = [...messages, { role: 'user', content: userText }];

                setIsLoading(true);

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            systemInstruction: { parts: [{ text: (() => {
                                const useTv = selectedSource === 'tv' || selectedSource === 'both';
                                const useX = selectedSource === 'x' || selectedSource === 'both';
                                let prompt = 'あなたはデータを分析し、最新のトレンドを検知・解説する優秀なAIエージェントです。\nユーザーの指示に対して、ミス無く正確に集計・分析し、分かりやすく提示してください。\n\n';
                                if (useTv) {
                                    prompt += '【情報ソース1: TVメタデータ】\n' + TV_META_DATA_INFO + '\n以下が2025年10月のTVメタデータの内容です：\n' + JSON.stringify(window.TV_META_DATA) + '\n\n';
                                }
                                if (useX) {
                                    prompt += '【情報ソース2: Xデータ】\n' + X_DATA_INFO + '\n以下がXデータの内容です：\n' + JSON.stringify(window.X_DATA) + '\n\n';
                                }
                                prompt += 'これらのデータを総合的に推測・活用し、ユーザーの課題解決をサポートしてください。\n\n【回答時の禁止事項】\n回答にシーンIDや内部IDを列挙・記載しないでください。データの出典としてIDを示す必要はありません。\n\n【グラフ表示について】\nユーザーが明示的に「グラフ」「チャート」「図」「可視化」などを求めた場合のみグラフを出力してください。求められていない場合はテキストのみで回答してください。\nグラフを出力する場合は、必ずSVGタグを使ってインラインSVGで描画してください。\nコードブロック（バッククォート3つ）で囲まず、<svg>タグから始まり</svg>で終わる形式でそのままHTMLとして出力してください。JSONも絶対に使用しないでください。SVGのコメントも省略してください。\n\n回答の末尾に、あなたが参照したデータのIDを以下のJSON形式で必ず付記してください（説明不要）：\n<!-- REFS:{"tv":["sceneId1","sceneId2"],"x":[{"date":"2025年10月1日"},{"date":"2025年10月2日"}]} -->\nTVデータを参照していない場合は"tv":[]、Xデータを参照していない場合は"x":[]としてください。Xデータは日付単位で記載してください（rankは不要）。';
                                return prompt;
                            })() }] },
                            contents: newMessages.map(msg => ({
                                role: msg.role === 'model' ? 'model' : 'user',
                                parts: [{ text: msg.content }]
                            }))

                    const cleanContent = aiResponse.replace(/<!--\s*REFS\s*:[\s\S]*?-->/i, '').trim();

                    'テレビ露出データまたはX分析データから、消費者の食の関心はどのように変化していますか？',

                    '最近テレビ番組またはXで紹介されている料理の傾向から、○○（スイーツ、和食、肉料理等）の新しいメニューを提案してください。',
                    '最近テレビ又はXで話題の食材を使った飲食店向けメニューを考えてください。',

                ].join('\n');
                const supportPrompt = `あなたはトレンド分析ツールのサポートAIです。
ユーザーが「${queryText}」について知りたいと入力しました。

以下の定型質問リストを参考に、「${queryText}」のキーワードを組み込んだ具体的な質問を3つ作成してください。
質問は定型質問リストの文体・スタイルに沿った内容にしてください。

定型質問リスト（参考）：
${templateQuestions}

必ず以下のJSON形式のみで回答してください。JSONの前後に余分なテキストや\`\`\`は付けないこと。
{"intro":"1〜2文の導入コメント","questions":["質問1","質問2","質問3"]}`;

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({

                    const data = await response.json();
                    if (data.error) throw new Error(data.error.message);

                    const raw = data.candidates[0].content.parts[0].text;
                    // JSONを抽出（```json ... ``` にも対応）
                    const jsonMatch = raw.match(/\{[\s\S]*\}/);

                    if (jsonMatch) {
                        try {

                            intro = parsed.intro || '';

                    }

            // キーボードのEnterで送信
            const handleKeyDown = (e) => {

            return (

                            const suggestions = isSupport ? (msg.suggestions || []) : [];

                            const isLastAiMsg = !isUser && index === messages.length - 1;

                                <div key={index} ref={isLastAiMsg ? lastAiMsgRef : null} className={`flex ${isUser ? 'justify-end' : 'justify-start'}`}>

                                        </div>
                                        
                                        <div 
                                            className="markdown-body text-sm leading-relaxed"
                                            dangerouslySetInnerHTML={{ __html: (() => {
                                                // SVGをmarked.parse()に渡す前に退避し、後から復元する
                                                const svgBlocks = [];
                                                let processed = mainText;

                                                // パターン1: ```svg ... ``` コードブロック
                                                processed = processed.replace(/```svg\s*([\s\S]*?)```/g, (m, svg) => {
                                                    const idx = svgBlocks.length;
                                                    svgBlocks.push(svg.trim());
                                                    return '\n\nSVG_BLOCK_' + idx + '\n\n';
                                                });

                                                // パターン2: ``` ... ``` 言語指定なし（中身がSVGの場合）
                                                processed = processed.replace(/```([\s\S]*?)```/g, (m, code) => {
                                                    const trimmed = code.trim();
                                                    if (trimmed.startsWith('<svg') || trimmed.startsWith('&lt;svg')) {
                                                        const decoded = trimmed.replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&amp;/g,'&').replace(/&quot;/g,'"').replace(/&#39;/g,"'");
                                                        const idx = svgBlocks.length;
                                                        svgBlocks.push(decoded);
                                                        return '\n\nSVG_BLOCK_' + idx + '\n\n';
                                                    }
                                                    return m;
                                                });

                                                // パターン3: 裸の <svg>...</svg> ブロック
                                                processed = processed.replace(/<svg[\s\S]*?<\/svg>/g, (m) => {
                                                    const idx = svgBlocks.length;
                                                    svgBlocks.push(m);
                                                    return '\n\nSVG_BLOCK_' + idx + '\n\n';
                                                });

                                                // marked.parse() を実行
                                                let html = marked.parse(processed);

                                                // プレースホルダーをSVGに戻す
                                                svgBlocks.forEach((svg, idx) => {
                                                    html = html.replace('<p>SVG_BLOCK_' + idx + '</p>', svg);
                                                    html = html.replace('SVG_BLOCK_' + idx, svg);
                                                });

                                                return html;
                                            })() }}
                                        />

                                        {suggestions.length > 0 && (

                                                                    : (isDark ? 'bg-[#2a2440] hover:bg-purple-700/60 text-purple-100 border border-purple-700/50 hover:border-purple-500' : 'bg-purple-50 hover:bg-purple-600 text-purple-900 hover:text-white border border-purple-200 hover:border-purple-500')
                                                            }`}
                                                        >

                                                                    : (isDark ? 'bg-purple-700/60 text-purple-200 group-hover:bg-purple-500 group-hover:text-white' : 'bg-purple-200 text-purple-700 group-hover:bg-white/30 group-hover:text-white')

                                            const meta = ftMeta[msg.fileRequest];

                                            const fname = window.FILE_UTILS.getFilename(msg.fileRequest);
                                            return (
                                                <div className={`mt-4 pt-4 border-t ${isDark ? 'border-gray-700' : 'border-gray-200'}`}>

                                                        <i className="ph ph-download-simple"></i> ファイルをダウンロード
                                                    </p>
                                                    <div className="flex flex-wrap gap-2">
                                                        <button
                                                            onClick={() => {
                                                                if (msg.fileRequest === 'docx') window.FILE_UTILS.generateDocx(msg.content, fname);

                                                            style={{ background: meta.bg, color: meta.color, border: `1.5px solid ${meta.color}33` }}
                                                        >

                                                            <div className="text-left leading-tight">
                                                                <div style={{ fontSize: '11px', opacity: 0.75, fontWeight: 400 }}>{fname}</div>
                                                                <div>{meta.label}</div>

                                                        </button>
                                                    </div>
                                                </div>
                                            );

                                    onClick={() => handleSend()}
                                    disabled={isLoading || !input.trim()}
                                    className={`flex items-center justify-center p-2.5 rounded-xl transition-all ${
                                        !input.trim() || isLoading
                                            ? (isDark ? 'bg-gray-800 text-gray-600' : 'bg-gray-200 text-gray-400')
                                            : 'bg-blue-600 text-white hover:bg-blue-700 shadow-md'
                                    }`}
                                >
                                    <i className="ph ph-paper-plane-right text-lg"></i>
                                </button>
                            </div>
                        </div>
                        {!apiKey && (
                            <p className="text-center text-xs text-red-500 mt-3">
                                <i className="ph ph-warning-circle mr-1"></i>
                                左下の「設定」からパスワードを入力してロックを解除してください
                            </p>
                        )}
                    </div>
                </div>
            );
        };

        // 3. APIキー設定モーダル
        const ApiKeyModal = ({ isOpen, onClose, onSave, theme, setTheme }) => {
            const [activeTab, setActiveTab] = React.useState('user');
            const [password, setPassword] = React.useState('');
            const [adminApiKey, setAdminApiKey] = React.useState('');
            const [adminPassword, setAdminPassword] = React.useState('');
            const [encryptedResult, setEncryptedResult] = React.useState('');
            const [errorMsg, setErrorMsg] = React.useState('');
            
            const isDark = theme === 'dark';

            React.useEffect(() => {
                if (isOpen) {
                    setPassword(safeStorage.getItem('tv_meta_password') || '');
                    setErrorMsg('');
                }
            }, [isOpen]);

            if (!isOpen) return null;

            const handleSaveUser = () => {
                if (!ENCRYPTED_API_KEY) {
                    setErrorMsg('システムに暗号化キーが設定されていません。管理者設定からキーを生成してソースコードに貼り付けてください。');
                    return;
                }
                try {
                    const bytes = CryptoJS.AES.decrypt(ENCRYPTED_API_KEY, password);
                    const decryptedKey = bytes.toString(CryptoJS.enc.Utf8);
                    
                    if (decryptedKey && decryptedKey.startsWith('AIza')) {
                        onSave(decryptedKey, password);
                        setErrorMsg('');
                    } else {
                        setErrorMsg('パスワードが間違っているか、キーが不正です。');
                    }
                } catch (e) {
                    setErrorMsg('復号化に失敗しました。パスワードを確認してください。');
                }
            };

            const handleEncrypt = () => {
                if (!adminApiKey || !adminPassword) {
                    setErrorMsg('APIキーとパスワード両方を入力してください。');
                    return;
                }
                try {
                    const encrypted = CryptoJS.AES.encrypt(adminApiKey, adminPassword).toString();
                    setEncryptedResult(encrypted);
                    setErrorMsg('');
                } catch (e) {
                    setErrorMsg('暗号化処理に失敗しました。');
                }
            };

            return (
                <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                    <div className={`w-full max-w-md rounded-2xl overflow-hidden shadow-xl ${isDark ? 'bg-[#1e1e20] text-gray-100 border border-gray-700' : 'bg-white text-gray-900'}`}>
                        {/* ヘッダーとタブ */}
                        <div className={`px-6 pt-6 pb-0 border-b ${isDark ? 'border-gray-700' : 'border-gray-200'}`}>
                            <div className="flex justify-between items-center mb-4">
                                <h2 className="text-xl font-bold flex items-center gap-2">
                                    <i className="ph ph-gear-six text-blue-500"></i>設定
                                </h2>
                                <button onClick={onClose} className="p-1 rounded-lg hover:bg-gray-500/20 transition-colors">
                                    <i className="ph ph-x text-xl"></i>
                                </button>
                            </div>
                            <div className="flex gap-4">
                                <button 
                                    onClick={() => {setActiveTab('user'); setErrorMsg('');}}
                                    className={`pb-3 text-sm font-bold border-b-2 transition-colors ${activeTab === 'user' ? 'border-blue-500 text-blue-500' : 'border-transparent text-gray-500 hover:text-gray-400'}`}
                                >
                                    ユーザー設定
                                </button>
                                <button 
                                    onClick={() => {setActiveTab('admin'); setErrorMsg('');}}
                                    className={`pb-3 text-sm font-bold border-b-2 transition-colors ${activeTab === 'admin' ? 'border-blue-500 text-blue-500' : 'border-transparent text-gray-500 hover:text-gray-400'}`}
                                >
                                    管理者設定
                                </button>
                            </div>
                        </div>
                        
                        <div className="p-6">
                            {errorMsg && (
                                <div className="mb-4 p-3 rounded-lg bg-red-500/10 border border-red-500/50 text-red-500 text-xs">
                                    {errorMsg}
                                </div>
                            )}

                            {activeTab === 'user' && (
                                <div className="space-y-4">
                                    <div>
                                        <label className={`block text-sm font-medium mb-2 ${isDark ? 'text-gray-300' : 'text-gray-700'}`}>
                                            パスワード
                                        </label>
                                        <input
                                            type="password"
                                            value={password}
                                            onChange={(e) => setPassword(e.target.value)}
                                            placeholder="管理者が設定したパスワードを入力"
                                            className={`w-full px-4 py-3 rounded-xl border outline-none transition-colors ${
                                                isDark 
                                                    ? 'bg-[#131314] border-gray-700 focus:border-blue-500' 
                                                    : 'bg-gray-50 border-gray-300 focus:border-blue-500'
                                            }`}
                                        />
                                        <p className={`text-xs mt-2 ${isDark ? 'text-gray-500' : 'text-gray-500'}`}>
                                            パスワードはブラウザのローカルストレージにのみ保存されます。
                                        </p>
                                    </div>

                                    <div className={`pt-4 border-t ${isDark ? 'border-gray-700' : 'border-gray-200'}`}>
                                        <label className={`block text-sm font-medium mb-3 ${isDark ? 'text-gray-300' : 'text-gray-700'}`}>
                                            外観テーマ
                                        </label>
                                        <div className="flex gap-3">
                                            <button 
                                                onClick={() => setTheme('light')}
                                                className={`flex-1 py-2 px-3 rounded-xl flex items-center justify-center gap-2 border transition-all ${
                                                    theme === 'light' 
                                                        ? 'border-blue-500 bg-blue-500/10 text-blue-600' 
                                                        : (isDark ? 'border-gray-700 hover:bg-gray-800' : 'border-gray-300 hover:bg-gray-100')
                                                }`}
                                            >
                                                <i className="ph ph-sun"></i> ライト
                                            </button>
                                            <button 
                                                onClick={() => setTheme('dark')}
                                                className={`flex-1 py-2 px-3 rounded-xl flex items-center justify-center gap-2 border transition-all ${
                                                    theme === 'dark' 
                                                        ? 'border-blue-500 bg-blue-500/10 text-blue-400' 
                                                        : (isDark ? 'border-gray-700 hover:bg-gray-800' : 'border-gray-300 hover:bg-gray-100')
                                                }`}
                                            >
                                                <i className="ph ph-moon"></i> ダーク
                                            </button>
                                        </div>
                                    </div>

                                    <div className="flex justify-end gap-3 mt-6">
                                        <button 
                                            onClick={onClose}
                                            className={`px-4 py-2 rounded-xl text-sm font-medium transition-colors ${
                                                isDark ? 'hover:bg-gray-800 text-gray-300' : 'hover:bg-gray-100 text-gray-600'
                                            }`}
                                        >
                                            キャンセル
                                        </button>
                                        <button 
                                            onClick={handleSaveUser}
                                            className="px-5 py-2 rounded-xl text-sm font-medium bg-blue-600 hover:bg-blue-700 text-white transition-colors shadow-lg shadow-blue-500/20"
                                        >
                                            保存・ロック解除
                                        </button>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'admin' && (
                                <div className="space-y-4">
                                    <div>
                                        <label className={`block text-sm font-medium mb-2 ${isDark ? 'text-gray-300' : 'text-gray-700'}`}>
                                            Gemini API Key
                                        </label>
                                        <input
                                            type="password"
                                            value={adminApiKey}
                                            onChange={(e) => setAdminApiKey(e.target.value)}
                                            placeholder="AIzaSy..."
                                            className={`w-full px-4 py-2 rounded-xl border outline-none text-sm transition-colors ${
                                                isDark ? 'bg-[#131314] border-gray-700 focus:border-blue-500' : 'bg-gray-50 border-gray-300 focus:border-blue-500'
                                            }`}
                                        />
                                    </div>
                                    <div>
                                        <label className={`block text-sm font-medium mb-2 ${isDark ? 'text-gray-300' : 'text-gray-700'}`}>
                                            任意のパスワード
                                        </label>
                                        <input
                                            type="text"
                                            value={adminPassword}
                                            onChange={(e) => setAdminPassword(e.target.value)}
                                            placeholder="利用者に共有するパスワード"
                                            className={`w-full px-4 py-2 rounded-xl border outline-none text-sm transition-colors ${
                                                isDark ? 'bg-[#131314] border-gray-700 focus:border-blue-500' : 'bg-gray-50 border-gray-300 focus:border-blue-500'
                                            }`}
                                        />
                                    </div>
                                    <button 
                                        onClick={handleEncrypt}
                                        className="w-full py-2 rounded-xl text-sm font-medium bg-purple-600 hover:bg-purple-700 text-white transition-colors"
                                    >
                                        暗号化文字列を生成
                                    </button>

                                    {encryptedResult && (
                                        <div className="mt-4">
                                            <label className={`block text-sm font-medium mb-2 ${isDark ? 'text-gray-300' : 'text-gray-700'}`}>
                                                生成された暗号化文字列 (ENCRYPTED_API_KEY に貼り付け)
                                            </label>
                                            <textarea
                                                readOnly
                                                value={encryptedResult}
                                                className={`w-full h-24 p-3 rounded-xl border outline-none text-xs font-mono break-all ${
                                                    isDark ? 'bg-[#131314] border-gray-700 text-gray-300' : 'bg-gray-50 border-gray-300 text-gray-700'
                                                }`}
                                                onClick={(e) => e.target.select()}
                                            />
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };


        // =============================================
        // 3. キーワードマップ コンポーネント
        const KeywordMapView = ({ theme }) => {
            const isDark = theme === 'dark';
            const [selectedKw, setSelectedKw] = React.useState(null);
            const [filterSource, setFilterSource] = React.useState('all');

            // ── 日付ユーティリティ（RankingViewと共通仕様） ──────────
            const parseTVDate  = (s) => { if (!s) return null; const [y,m,d] = s.split('/').map(Number); return new Date(y, m-1, d); };
            const parseXDate   = (s) => { if (!s) return null; const mt = s.match(/(\d+)年(\d+)月(\d+)日/); return mt ? new Date(+mt[1], +mt[2]-1, +mt[3]) : null; };
            const toInputVal   = (d) => { if (!d) return ''; return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; };
            const fromInputVal = (s) => s ? new Date(s + 'T00:00:00') : null;

            const { dataMinDate, dataMaxDate } = React.useMemo(() => {
                let mn = null, mx = null;
                window.TV_META_DATA.forEach(d => { const dt = parseTVDate(d.date); if (!dt) return; if (!mn||dt<mn) mn=dt; if (!mx||dt>mx) mx=dt; });
                window.X_DATA.forEach(day  => { const dt = parseXDate(day.date);  if (!dt) return; if (!mn||dt<mn) mn=dt; if (!mx||dt>mx) mx=dt; });
                return { dataMinDate: mn, dataMaxDate: mx };
            }, []);

            const [startDate, setStartDate] = React.useState(() => dataMinDate);
            const [endDate,   setEndDate]   = React.useState(() => dataMaxDate);

            const setQuick = (days) => {
                if (!dataMaxDate) return;
                if (days === 0) { setStartDate(dataMinDate); setEndDate(dataMaxDate); setSelectedKw(null); return; }
                const s = new Date(dataMaxDate); s.setDate(s.getDate() - (days - 1));
                setStartDate(s < dataMinDate ? dataMinDate : s); setEndDate(dataMaxDate); setSelectedKw(null);
            };

            const filteredTV = React.useMemo(() => window.TV_META_DATA.filter(d => {
                const dt = parseTVDate(d.date); if (!dt) return false;
                if (startDate && dt < startDate) return false;
                if (endDate   && dt > endDate)   return false;
                return true;
            }), [startDate, endDate]);

            const filteredX = React.useMemo(() => window.X_DATA.filter(day => {
                const dt = parseXDate(day.date); if (!dt) return false;
                if (startDate && dt < startDate) return false;
                if (endDate   && dt > endDate)   return false;
                return true;
            }), [startDate, endDate]);

            const STOP = new Set(['グルメ','レシピ','おうちごはん','PR','秋グルメ','健康ごはん','時短ごはん','コンビニ新商品','おはようございます','おうちごはん']);

            const { allKeywords, tvRelations } = React.useMemo(() => {
                // TV キーワード集計
                const tvKw = {};
                const tvRel = {};
                filteredTV.forEach(d => {
                    const items = [];
                    if (d.theme) items.push(d.theme.trim());
                    (d.tags || '').split(',').forEach(t => { const s = t.trim(); if (s) items.push(s); });
                    items.forEach(k => {
                        if (k.length >= 3 && !STOP.has(k)) {
                            tvKw[k] = (tvKw[k] || 0) + 1;
                            if (!tvRel[k]) tvRel[k] = new Set();
                            items.forEach(k2 => { if (k2 !== k && k2.length >= 3 && !STOP.has(k2)) tvRel[k].add(k2); });
                        }
                    });
                });
                // X キーワード集計
                const xKw = {};
                filteredX.forEach(day => {
                    (day.tags || '').split(',').forEach(t => {
                        const s = t.trim().replace(/^#/, '');
                        if (s.length >= 3 && !STOP.has(s)) xKw[s] = (xKw[s] || 0) + 1;
                    });
                });
                // マージ
                const all = {};
                Object.keys(tvKw).forEach(k => { all[k] = { tv: tvKw[k], x: 0, total: tvKw[k], source: 'tv' }; });
                Object.keys(xKw).forEach(k => {
                    let matched = false;
                    Object.keys(all).forEach(tvK => {
                        if (tvK === k || tvK.includes(k) || k.includes(tvK)) {
                            all[tvK].x += xKw[k];
                            all[tvK].total += xKw[k];
                            all[tvK].source = 'both';
                            matched = true;
                        }
                    });
                    if (!matched) all[k] = { tv: 0, x: xKw[k], total: xKw[k], source: 'x' };
                });
                const sorted = Object.entries(all)
                    .sort((a, b) => b[1].total - a[1].total)
                    .slice(0, 60)
                    .map(([keyword, data]) => ({ keyword, ...data }));
                return { allKeywords: sorted, tvRelations: tvRel };
            }, [filteredTV, filteredX]);

            const mapData = React.useMemo(() => {
                const filtered = filterSource === 'all' ? allKeywords
                    : allKeywords.filter(k =>
                        filterSource === 'both' ? k.source === 'both'
                        : filterSource === 'tv'  ? k.source === 'tv'
                        : k.source === 'x');
                const W = 800, H = 560;
                const maxTotal = Math.max(...filtered.map(k => k.total), 1);
                return filtered.slice(0, 50).map((k, i) => {
                    const r = 14 + (k.total / maxTotal) * 42;
                    const angle = i * 2.399; // golden angle ≈ 137.5°
                    const dist  = 55 + Math.sqrt(i) * 52;
                    const x = W / 2 + Math.cos(angle) * dist;
                    const y = H / 2 + Math.sin(angle) * dist;
                    return { ...k, r, x: Math.max(r + 6, Math.min(W - r - 6, x)), y: Math.max(r + 6, Math.min(H - r - 6, y)) };
                });
            }, [allKeywords, filterSource]);

            const getColor = (source) => {
                if (source === 'tv')   return isDark ? '#3b82f6' : '#2563eb';
                if (source === 'x')    return isDark ? '#f59e0b' : '#d97706';
                return isDark ? '#a855f7' : '#7c3aed';
            };

            const getRelated = (kw) => {
                if (!kw) return [];
                const set = tvRelations[kw.keyword] || new Set();
                return allKeywords.filter(k => k.keyword !== kw.keyword && (
                    kw.keyword.includes(k.keyword) || k.keyword.includes(kw.keyword) || set.has(k.keyword)
                )).slice(0, 6);
            };

            const related = React.useMemo(() => getRelated(selectedKw), [selectedKw, allKeywords]);

            const FILTERS = [
                { id: 'all',  label: 'すべて' },
                { id: 'tv',   label: 'TVのみ' },
                { id: 'x',    label: 'Xのみ' },
                { id: 'both', label: 'クロス' }
            ];

            return (
                <div className={`flex-1 flex flex-col overflow-hidden ${isDark ? 'bg-[#131314]' : 'bg-gray-50'}`}>
                    {/* ヘッダー */}
                    <div className={`px-6 py-4 border-b flex-shrink-0 ${isDark ? 'border-gray-800 bg-[#1a1a1e]' : 'border-gray-200 bg-white'}`}>
                        <div className="flex items-start gap-3 flex-wrap">
                            <div className="flex items-center gap-2 flex-shrink-0 mt-0.5">
                                <i className="ph ph-graph text-xl text-purple-400"></i>
                                <h2 className={`text-xl font-bold ${isDark ? 'text-white' : 'text-gray-900'}`}>キーワードマップ</h2>
                            </div>
                            {/* 日付範囲選択 */}
                            <div className="flex items-center gap-2 flex-wrap flex-1 min-w-0">
                                <div className={`flex items-center gap-1.5 px-2 py-1.5 rounded-lg border text-sm ${isDark ? 'border-gray-700 bg-[#131314]' : 'border-gray-300 bg-gray-50'}`}>
                                    <i className={`ph ph-calendar text-base ${isDark ? 'text-gray-400' : 'text-gray-500'}`}></i>
                                    <input type="date"
                                        value={toInputVal(startDate)}
                                        min={toInputVal(dataMinDate)} max={toInputVal(endDate)}
                                        onChange={e => { setStartDate(fromInputVal(e.target.value) || dataMinDate); setSelectedKw(null); }}
                                        className={`bg-transparent outline-none text-sm w-32 ${isDark ? 'text-gray-200' : 'text-gray-800'}`}
                                        style={{colorScheme: isDark ? 'dark' : 'light'}} />
                                    <span className={isDark ? 'text-gray-500' : 'text-gray-400'}>〜</span>
                                    <input type="date"
                                        value={toInputVal(endDate)}
                                        min={toInputVal(startDate)} max={toInputVal(dataMaxDate)}
                                        onChange={e => { setEndDate(fromInputVal(e.target.value) || dataMaxDate); setSelectedKw(null); }}
                                        className={`bg-transparent outline-none text-sm w-32 ${isDark ? 'text-gray-200' : 'text-gray-800'}`}
                                        style={{colorScheme: isDark ? 'dark' : 'light'}} />
                                </div>
                                {/* クイック選択 */}
                                <div className="flex gap-1">
                                    {[['7日', 7], ['14日', 14], ['全期間', 0]].map(([lbl, d]) => (
                                        <button key={lbl} onClick={() => setQuick(d)}
                                            className={`px-2.5 py-1.5 text-xs rounded-lg font-medium transition-colors whitespace-nowrap ${isDark ? 'bg-gray-800 text-gray-300 hover:bg-gray-700' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>
                                            {lbl === '全期間' ? lbl : `直近${lbl}`}
                                        </button>
                                    ))}
                                </div>
                                {/* 件数サマリー */}
                                <span className={`text-xs ml-1 ${isDark ? 'text-gray-500' : 'text-gray-400'}`}>
                                    TV {filteredTV.length}件 ／ X {filteredX.length}日分
                                </span>
                            </div>
                            {/* ソースフィルター */}
                            <div className="flex gap-1.5 flex-shrink-0">
                                {FILTERS.map(f => (
                                    <button key={f.id} onClick={() => { setFilterSource(f.id); setSelectedKw(null); }}
                                        className={`px-3 py-1.5 text-xs rounded-lg font-medium transition-colors ${
                                            filterSource === f.id
                                                ? (isDark ? 'bg-emerald-700 text-white' : 'bg-emerald-600 text-white')
                                                : (isDark ? 'text-gray-400 hover:bg-gray-800' : 'text-gray-500 hover:bg-gray-100')
                                        }`}>{f.label}</button>
                                ))}
                            </div>
                        </div>
                        <div className="flex gap-5 mt-2 text-xs">
                            {[['bg-blue-500','TVメタデータ'],['bg-yellow-500','Xデータ'],['bg-purple-500','クロスメディア']].map(([cls,lbl]) => (
                                <span key={lbl} className="flex items-center gap-1.5">
                                    <span className={`w-2.5 h-2.5 rounded-full ${cls}`}></span>
                                    <span className={isDark ? 'text-gray-400' : 'text-gray-500'}>{lbl}</span>
                                </span>
                            ))}
                            <span className={isDark ? 'text-gray-600' : 'text-gray-400'}>バブルをクリックで詳細表示</span>
                        </div>
                    </div>

                    {/* メインコンテンツ */}
                    <div className="flex-1 flex overflow-hidden min-h-0">
                        {/* SVGマップ */}
                        <div className="flex-1 relative overflow-hidden">
                            <svg viewBox="0 0 800 560" style={{width:'100%',height:'100%'}}
                                className={isDark ? 'bg-[#131314]' : 'bg-gray-50'}>
                                {/* グリッドの薄いドット */}
                                <defs>
                                    <pattern id="kmdot" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
                                        <circle cx="20" cy="20" r="1" fill={isDark ? 'rgba(255,255,255,0.04)' : 'rgba(0,0,0,0.04)'} />
                                    </pattern>
                                </defs>
                                <rect width="800" height="560" fill="url(#kmdot)" />

                                {/* 選択キーワード→関連の接続線 */}
                                {selectedKw && related.map(rel => {
                                    const src = mapData.find(k => k.keyword === selectedKw.keyword);
                                    const dst = mapData.find(k => k.keyword === rel.keyword);
                                    if (!src || !dst) return null;
                                    return (
                                        <line key={rel.keyword}
                                            x1={src.x} y1={src.y} x2={dst.x} y2={dst.y}
                                            stroke={isDark ? 'rgba(168,85,247,0.5)' : 'rgba(124,58,237,0.35)'}
                                            strokeWidth="1.5" strokeDasharray="5,4" />
                                    );
                                })}

                                {/* バブル */}
                                {mapData.map(k => {
                                    const isSel     = selectedKw?.keyword === k.keyword;
                                    const isRel     = related.some(r => r.keyword === k.keyword);
                                    const color     = getColor(k.source);
                                    const alpha     = selectedKw ? (isSel || isRel ? 1 : 0.18) : 0.88;
                                    const fontSize  = Math.max(8, Math.min(12, k.r * 0.68));
                                    const shortLabel = k.keyword.length > 8 ? k.keyword.slice(0,8) + '…' : k.keyword;
                                    return (
                                        <g key={k.keyword} transform={`translate(${k.x},${k.y})`}
                                            onClick={() => setSelectedKw(isSel ? null : k)}
                                            style={{cursor:'pointer'}}>
                                            {isSel && (
                                                <circle r={k.r + 6} fill="none" stroke={color} strokeWidth="1.5" opacity="0.0">
                                                    <animate attributeName="r"       values={`${k.r+3};${k.r+12}`} dur="1.4s" repeatCount="indefinite"/>
                                                    <animate attributeName="opacity" values="0.6;0"               dur="1.4s" repeatCount="indefinite"/>
                                                </circle>
                                            )}
                                            <circle r={k.r}
                                                fill={color} fillOpacity={alpha * 0.55}
                                                stroke={color} strokeWidth={isSel ? 2.5 : isRel ? 2 : 0.8}
                                                strokeOpacity={alpha} />
                                            <text textAnchor="middle" dominantBaseline="middle"
                                                fontSize={fontSize} fontWeight={isSel ? 'bold' : 'normal'}
                                                fill={isDark ? '#fff' : '#1a1a1a'} fillOpacity={alpha}
                                                style={{pointerEvents:'none', userSelect:'none'}}>
                                                {shortLabel}
                                            </text>
                                        </g>
                                    );
                                })}
                            </svg>
                        </div>

                        {/* サイドパネル */}
                        <div className={`w-60 border-l overflow-y-auto flex-shrink-0 ${isDark ? 'border-gray-800 bg-[#1a1a1e]' : 'border-gray-200 bg-white'}`}>
                            {selectedKw ? (
                                <div className="p-4">
                                    <div className="flex items-start justify-between mb-3">
                                        <h3 className={`font-bold text-sm leading-tight ${isDark ? 'text-white' : 'text-gray-900'}`}>
                                            {selectedKw.keyword}
                                        </h3>
                                        <button onClick={() => setSelectedKw(null)}
                                            className={`text-base leading-none ml-2 flex-shrink-0 ${isDark ? 'text-gray-500 hover:text-gray-200' : 'text-gray-400 hover:text-gray-700'}`}>✕</button>
                                    </div>
                                    {/* ソースバッジ */}
                                    <div className="mb-3">
                                        <span className={`text-xs px-2 py-0.5 rounded-full font-medium`}
                                            style={{background: getColor(selectedKw.source) + (isDark ? '33' : '22'), color: getColor(selectedKw.source)}}>
                                            {selectedKw.source === 'tv' ? 'TVメタデータ' : selectedKw.source === 'x' ? 'Xデータ' : 'クロスメディア'}
                                        </span>
                                    </div>
                                    {/* スタッツ */}
                                    <div className="grid grid-cols-2 gap-2 mb-3">
                                        <div className={`rounded-lg p-2.5 text-center ${isDark ? 'bg-blue-900/30' : 'bg-blue-50'}`}>
                                            <div className="text-xs text-blue-400 mb-0.5">TV露出</div>
                                            <div className={`text-xl font-bold ${isDark ? 'text-blue-300' : 'text-blue-700'}`}>{selectedKw.tv}</div>
                                        </div>
                                        <div className={`rounded-lg p-2.5 text-center ${isDark ? 'bg-yellow-900/30' : 'bg-yellow-50'}`}>
                                            <div className="text-xs text-yellow-400 mb-0.5">X露出</div>
                                            <div className={`text-xl font-bold ${isDark ? 'text-yellow-300' : 'text-yellow-700'}`}>{selectedKw.x}</div>
                                        </div>
                                    </div>
                                    <div className={`rounded-lg p-2.5 text-center mb-4 ${isDark ? 'bg-gray-800' : 'bg-gray-100'}`}>
                                        <div className={`text-xs mb-0.5 ${isDark ? 'text-gray-400' : 'text-gray-500'}`}>合計スコア</div>
                                        <div className={`text-2xl font-bold ${isDark ? 'text-white' : 'text-gray-900'}`}>{selectedKw.total}</div>
                                    </div>
                                    {related.length > 0 && (
                                        <>
                                            <div className={`text-xs font-semibold mb-2 ${isDark ? 'text-gray-400' : 'text-gray-500'}`}>関連キーワード</div>
                                            <div className="flex flex-wrap gap-1.5">
                                                {related.map(r => (
                                                    <button key={r.keyword} onClick={() => setSelectedKw(r)}
                                                        className={`px-2 py-1 rounded-full text-xs font-medium transition-colors ${
                                                            isDark ? 'bg-purple-900/50 text-purple-300 hover:bg-purple-800/70' : 'bg-purple-100 text-purple-700 hover:bg-purple-200'
                                                        }`}>
                                                        {r.keyword}
                                                    </button>
                                                ))}
                                            </div>
                                        </>
                                    )}
                                </div>
                            ) : (
                                <div className="p-4">
                                    <div className={`text-xs font-semibold mb-3 ${isDark ? 'text-gray-400' : 'text-gray-500'}`}>TOP キーワード</div>
                                    <div className="space-y-0.5">
                                        {allKeywords.slice(0, 18).map((k, i) => (
                                            <button key={k.keyword} onClick={() => setSelectedKw(k)}
                                                className={`w-full flex items-center justify-between px-2 py-1.5 rounded-lg text-xs transition-colors ${
                                                    isDark ? 'hover:bg-gray-800 text-gray-300' : 'hover:bg-gray-100 text-gray-700'
                                                }`}>
                                                <span className="flex items-center gap-1.5 min-w-0">
                                                    <span className={`w-5 text-right font-bold flex-shrink-0 ${i < 3 ? 'text-yellow-400' : (isDark ? 'text-gray-600' : 'text-gray-400')}`}>{i+1}</span>
                                                    <span className="w-2 h-2 rounded-full flex-shrink-0" style={{background: getColor(k.source)}}></span>
                                                    <span className="truncate">{k.keyword}</span>
                                                </span>
                                                <span className={`font-bold flex-shrink-0 ml-1 ${isDark ? 'text-gray-500' : 'text-gray-400'}`}>{k.total}</span>
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // PositioningMapView コンポーネント
        const PositioningMapView = ({ theme }) => {
            const isDark = theme === 'dark';
            const [mode, setMode] = React.useState(0);
            const [selected, setSelected] = React.useState(null);
            const [hoveredKw, setHoveredKw] = React.useState(null);

            // ── 日付ユーティリティ（RankingView・KeywordMapViewと共通仕様） ──
            const parseTVDate  = (s) => { if (!s) return null; const [y,m,d] = s.split('/').map(Number); return new Date(y, m-1, d); };
            const parseXDate   = (s) => { if (!s) return null; const mt = s.match(/(\d+)年(\d+)月(\d+)日/); return mt ? new Date(+mt[1], +mt[2]-1, +mt[3]) : null; };
            const toInputVal   = (d) => { if (!d) return ''; return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; };
            const fromInputVal = (s) => s ? new Date(s + 'T00:00:00') : null;

            const { dataMinDate, dataMaxDate } = React.useMemo(() => {
                let mn = null, mx = null;
                window.TV_META_DATA.forEach(d => { const dt = parseTVDate(d.date); if (!dt) return; if (!mn||dt<mn) mn=dt; if (!mx||dt>mx) mx=dt; });
                window.X_DATA.forEach(day  => { const dt = parseXDate(day.date);  if (!dt) return; if (!mn||dt<mn) mn=dt; if (!mx||dt>mx) mx=dt; });
                return { dataMinDate: mn, dataMaxDate: mx };
            }, []);

            const [startDate, setStartDate] = React.useState(() => dataMinDate);
            const [endDate,   setEndDate]   = React.useState(() => dataMaxDate);

            const setQuick = (days) => {
                if (!dataMaxDate) return;
                if (days === 0) { setStartDate(dataMinDate); setEndDate(dataMaxDate); setSelected(null); return; }
                const s = new Date(dataMaxDate); s.setDate(s.getDate() - (days - 1));
                setStartDate(s < dataMinDate ? dataMinDate : s); setEndDate(dataMaxDate); setSelected(null);
            };

            const filteredTV = React.useMemo(() => window.TV_META_DATA.filter(d => {
                const dt = parseTVDate(d.date); if (!dt) return false;
                if (startDate && dt < startDate) return false;
                if (endDate   && dt > endDate)   return false;
                return true;
            }), [startDate, endDate]);

            const filteredX = React.useMemo(() => window.X_DATA.filter(day => {
                const dt = parseXDate(day.date); if (!dt) return false;
                if (startDate && dt < startDate) return false;
                if (endDate   && dt > endDate)   return false;
                return true;
            }), [startDate, endDate]);

            // ────────────────────────────────────────────
            // 辞書定義
            // ────────────────────────────────────────────
            const DICTS = {
                // Mode 0 — 話題性 × 新規性
                novel:  ['急増','ブーム','初上陸','新登場','注目','トレンド','上陸','第','専門店急増','拡大中','急上昇','再ブーム','再来','話題','急拡大','沸騰','続々','ネクスト','進化','急浮上'],
                legacy: ['定番','定着','伝統','昔ながら','根強い','老舗','定番化','日常化','再評価','江戸','古来','王道','懐かし','歴史','リバイバル','定番に','常連'],
                // Mode 1 — ターゲット × 価格帯
                young:  ['Z世代','韓国','SNS映え','コラボ','推し活','アニメ','食べ歩き','インスタ','若者','TikTok','キャラクター','ゲーム','若年','K-','コグマ','ヲタク'],
                senior: ['健康','薬膳','腸活','伝統','和食','老舗','機能性','温活','低糖質','免疫','高齢','シニア','中高年','ミドル','滋養'],
                highPrice: ['高級','プレミアム','贈答','ギフト','1000円','ホテル','百貨店','プチ贅沢','限定','職人','高付加価値','和牛','オマール','希少'],
                lowPrice:  ['コスパ','節約','激安','PB','コンビニ','時短','低コスト','代替','100円','まとめ買い','物価高対策','節約志向','お得','ワケあり','防衛'],
                // Mode 2 — 感情 × 日常非日常
                emotional: ['癒やし','感動','映え','推し','ノスタルジー','やみつき','絶品','かわいい','楽しい','感激','泣ける','ドラマ','共感','ほっこり','サプライズ','幸せ'],
                practical: ['栄養','タンパク質','時短','タイパ','健康','低糖質','節約','コスパ','簡単','機能性','効率','実用','便利','レシピ'],
                nonDaily: ['期間限定','フェス','イベント','万博','コラボ','体験','旅行','観光','初登場','特別','ラグジュアリー','非日常','限定','プレミアム'],
                daily:    ['おうちごはん','毎日','お弁当','朝食','常備','作り置き','普段使い','日常','定番','家族','夕食','昼食','おやつ','日常的']
            };

            const MODES = [
                {
                    name: '話題性 × 新規性',
                    xLabel: ['テレビで話題', 'Xで話題'],
                    yLabel: ['伝統的・定番', '新規・流行'],
                    quadrants: ['TV×定番\n（安定型コンテンツ）', 'SNS×新規\n（急浮上トレンド）', 'TV×新規\n（メディア主導の新潮流）', 'SNS×定番\n（ロングテール人気）'],
                    colors: ['#3b82f6', '#f59e0b']
                },
                {
                    name: 'ターゲット × 価格帯',
                    xLabel: ['若者向け', 'シニア向け'],
                    yLabel: ['低価格', '高価格'],
                    quadrants: ['若者×低価格\n（コスパ重視世代）', 'シニア×高価格\n（健康投資層）', '若者×高価格\n（プレミアム体験）', 'シニア×低価格\n（日常的健康食）'],
                    colors: ['#10b981', '#8b5cf6']
                },
                {
                    name: '感情 × 日常・非日常',
                    xLabel: ['実用的', '感情的'],
                    yLabel: ['日常的', '非日常的'],
                    quadrants: ['実用×日常\n（生活必需型）', '感情×非日常\n（体験・エンタメ型）', '実用×非日常\n（機能性イベント）', '感情×日常\n（癒やし・定番嗜好）'],
                    colors: ['#f43f5e', '#14b8a6']
                }
            ];

            // ────────────────────────────────────────────
            // スコア算出
            // ────────────────────────────────────────────
            const plotData = React.useMemo(() => {
                // テーマ単位でキーワード収集
                const themes = {};
                filteredTV.forEach(d => {
                    const key = d.theme ? d.theme.trim() : null;
                    if (!key || key.length < 2) return;
                    if (!themes[key]) themes[key] = { tv: 0, x: 0, texts: [] };
                    themes[key].tv += 1;
                    const parts = [d.explanation || '', d.tags || '', d.headline || '', d.genre || ''];
                    themes[key].texts.push(parts.join(' '));
                });

                // X側は tags/summary/explanation から近いテーマへマッピング
                filteredX.forEach(day => {
                    (day.posts || []).forEach(p => {
                        const combined = (p.explanation || '') + ' ' + (p.text || '');
                        Object.keys(themes).forEach(th => {
                            const thWords = th.replace(/[（(）)・]/g, ' ').split(/\s+/).filter(w => w.length >= 2);
                            if (thWords.some(w => combined.includes(w))) {
                                themes[th].x += 1;
                                themes[th].texts.push(combined);
                            }
                        });
                    });
                    const dayText = (day.summary || '') + ' ' + (day.tags || '');
                    Object.keys(themes).forEach(th => {
                        const thWords = th.replace(/[（(）)・]/g, ' ').split(/\s+/).filter(w => w.length >= 2);
                        if (thWords.some(w => dayText.includes(w))) {
                            themes[th].x += 0.5;
                            themes[th].texts.push(dayText);
                        }
                    });
                });

                const score = (texts, posWords, negWords) => {
                    let s = 0;
                    texts.forEach(t => {
                        posWords.forEach(w => { if (t.includes(w)) s += 1; });
                        negWords.forEach(w => { if (t.includes(w)) s -= 1; });
                    });
                    return s;
                };

                const items = Object.entries(themes)
                    .filter(([, d]) => d.tv >= 1)
                    .map(([theme, d]) => {
                        const tv = d.tv, x = d.x, texts = d.texts;
                        const total = tv + x;
                        // Mode 0
                        const xDiff = (x - tv) / Math.max(total, 1); // -1〜+1 (右=X)
                        const novelScore = score(texts, DICTS.novel, DICTS.legacy);
                        // Mode 1
                        const youngScore = score(texts, DICTS.young, DICTS.senior) * 0.6 + (x - tv) / Math.max(total, 1) * 2;
                        const priceScore = score(texts, DICTS.highPrice, DICTS.lowPrice);
                        // Mode 2
                        const emoScore  = score(texts, DICTS.emotional, DICTS.practical);
                        const nonDailyScore = score(texts, DICTS.nonDaily, DICTS.daily);
                        return { theme, tv, x, total, xDiff, novelScore, youngScore, priceScore, emoScore, nonDailyScore };
                    })
                    .sort((a, b) => b.total - a.total)
                    .slice(0, 55);

                // 正規化（z-score + クランプ）
                const normalize = (arr, key) => {
                    const vals = arr.map(d => d[key]);
                    const mean = vals.reduce((s, v) => s + v, 0) / vals.length;
                    const std  = Math.sqrt(vals.reduce((s, v) => s + (v - mean) ** 2, 0) / vals.length) || 1;
                    return arr.map(d => ({ ...d, [key + '_n']: Math.max(-1, Math.min(1, (d[key] - mean) / (std * 1.5))) }));
                };

                let result = items;
                result = normalize(result, 'xDiff');
                result = normalize(result, 'novelScore');
                result = normalize(result, 'youngScore');
                result = normalize(result, 'priceScore');
                result = normalize(result, 'emoScore');
                result = normalize(result, 'nonDailyScore');
                return result;
            }, [filteredTV, filteredX]);

            const m = MODES[mode];

            // モードごとの軸値取得
            const getXY = (d) => {
                if (mode === 0) return { x: d.xDiff_n,        y: d.novelScore_n };
                if (mode === 1) return { x: -d.youngScore_n,  y: d.priceScore_n };
                return                  { x: d.emoScore_n,     y: d.nonDailyScore_n };
            };

            // SVG座標変換
            const W = 860, H = 560, PAD = 56, BP = 24;
            const toSVG = (nx, ny) => ({
                svgX: PAD + BP + (nx + 1) / 2 * (W - PAD * 2 - BP * 2),
                svgY: PAD + BP + (1 - (ny + 1) / 2) * (H - PAD * 2 - BP * 2)
            });

            const bubbleR = (d) => Math.max(9, Math.min(26, 9 + d.total * 1.2));

            // 選択アイテム情報
            const selItem = selected ? plotData.find(d => d.theme === selected) : null;
            const nearItems = selItem ? (() => {
                const { x: sx, y: sy } = getXY(selItem);
                return plotData
                    .filter(d => d.theme !== selItem.theme)
                    .map(d => { const { x, y } = getXY(d); return { ...d, dist: Math.hypot(x - sx, y - sy) }; })
                    .sort((a, b) => a.dist - b.dist)
                    .slice(0, 4);
            })() : [];

            return (
                <div className={`flex-1 flex flex-col overflow-hidden ${isDark ? 'bg-[#131314]' : 'bg-gray-50'}`}>
                    {/* ヘッダー */}
                    <div className={`px-6 py-4 border-b flex-shrink-0 ${isDark ? 'border-gray-800 bg-[#1a1a1e]' : 'border-gray-200 bg-white'}`}>
                        <div className="flex items-start gap-3 flex-wrap">
                            <div className="flex items-center gap-2 flex-shrink-0 mt-0.5">
                                <i className="ph ph-chart-scatter text-xl text-emerald-400"></i>
                                <h2 className={`text-xl font-bold ${isDark ? 'text-white' : 'text-gray-900'}`}>ポジショニングマップ</h2>
                            </div>
                            {/* 日付範囲選択 */}
                            <div className="flex items-center gap-2 flex-wrap flex-1 min-w-0">
                                <div className={`flex items-center gap-1.5 px-2 py-1.5 rounded-lg border text-sm ${isDark ? 'border-gray-700 bg-[#131314]' : 'border-gray-300 bg-gray-50'}`}>
                                    <i className={`ph ph-calendar text-base ${isDark ? 'text-gray-400' : 'text-gray-500'}`}></i>
                                    <input type="date"
                                        value={toInputVal(startDate)}
                                        min={toInputVal(dataMinDate)} max={toInputVal(endDate)}
                                        onChange={e => { setStartDate(fromInputVal(e.target.value) || dataMinDate); setSelected(null); }}
                                        className={`bg-transparent outline-none text-sm w-32 ${isDark ? 'text-gray-200' : 'text-gray-800'}`}
                                        style={{colorScheme: isDark ? 'dark' : 'light'}} />
                                    <span className={isDark ? 'text-gray-500' : 'text-gray-400'}>〜</span>
                                    <input type="date"
                                        value={toInputVal(endDate)}
                                        min={toInputVal(startDate)} max={toInputVal(dataMaxDate)}
                                        onChange={e => { setEndDate(fromInputVal(e.target.value) || dataMaxDate); setSelected(null); }}
                                        className={`bg-transparent outline-none text-sm w-32 ${isDark ? 'text-gray-200' : 'text-gray-800'}`}
                                        style={{colorScheme: isDark ? 'dark' : 'light'}} />
                                </div>
                                {/* クイック選択 */}
                                <div className="flex gap-1">
                                    {[['7日', 7], ['14日', 14], ['全期間', 0]].map(([lbl, d]) => (
                                        <button key={lbl} onClick={() => setQuick(d)}
                                            className={`px-2.5 py-1.5 text-xs rounded-lg font-medium transition-colors whitespace-nowrap ${isDark ? 'bg-gray-800 text-gray-300 hover:bg-gray-700' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>
                                            {lbl === '全期間' ? lbl : `直近${lbl}`}
                                        </button>
                                    ))}
                                </div>
                                {/* 件数サマリー */}
                                <span className={`text-xs ml-1 ${isDark ? 'text-gray-500' : 'text-gray-400'}`}>
                                    TV {filteredTV.length}件 ／ X {filteredX.length}日分
                                </span>
                            </div>
                            {/* モード切替 */}
                            <div className="flex gap-1.5 flex-wrap flex-shrink-0">
                                {MODES.map((md, i) => (
                                    <button key={i} onClick={() => { setMode(i); setSelected(null); }}
                                        className={`px-3 py-1.5 text-xs rounded-lg font-medium transition-colors whitespace-nowrap ${
                                            mode === i
                                                ? (isDark ? 'bg-emerald-700 text-white' : 'bg-emerald-600 text-white')
                                                : (isDark ? 'text-gray-400 hover:bg-gray-800' : 'text-gray-500 hover:bg-gray-100')
                                        }`}>
                                        {md.name}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>

                    {/* メインコンテンツ */}
                    <div className="flex-1 flex overflow-hidden min-h-0">
                        {/* SVGエリア */}
                        <div className="flex-1 overflow-hidden p-2 flex items-center justify-center">
                            <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%', height:'100%', display:'block'}}>
                                <defs>
                                    <pattern id="pgrid" x="0" y="0" width="50" height="50" patternUnits="userSpaceOnUse">
                                        <path d={`M 50 0 L 0 0 0 50`} fill="none" stroke={isDark ? 'rgba(255,255,255,0.04)' : 'rgba(0,0,0,0.05)'} strokeWidth="1"/>
                                    </pattern>
                                    <clipPath id="plotClip">
                                        <rect x={0} y={0} width={W} height={H}/>
                                    </clipPath>
                                </defs>

                                {/* 背景 */}
                                <rect width={W} height={H} fill={isDark ? '#131314' : '#f9fafb'}/>
                                <rect x={PAD} y={PAD} width={W - PAD * 2} height={H - PAD * 2} fill="url(#pgrid)"/>

                                {/* 4象限の背景色 */}
                                {[
                                    [PAD,          PAD,          (W-PAD*2)/2, (H-PAD*2)/2],
                                    [(W+PAD*2)/2 - PAD, PAD,    (W-PAD*2)/2, (H-PAD*2)/2],
                                    [PAD,          (H+PAD*2)/2-PAD, (W-PAD*2)/2, (H-PAD*2)/2],
                                    [(W+PAD*2)/2 - PAD, (H+PAD*2)/2-PAD, (W-PAD*2)/2, (H-PAD*2)/2]
                                ].map(([rx, ry, rw, rh], qi) => (
                                    <rect key={qi} x={rx} y={ry} width={rw} height={rh}
                                        fill={qi % 2 === 0 ? (isDark ? 'rgba(255,255,255,0.015)' : 'rgba(0,0,0,0.012)') : 'transparent'}/>
                                ))}

                                {/* 軸線 */}
                                <line x1={PAD} y1={H/2} x2={W-PAD} y2={H/2} stroke={isDark ? 'rgba(255,255,255,0.25)' : 'rgba(0,0,0,0.2)'} strokeWidth="1.5"/>
                                <line x1={W/2} y1={PAD} x2={W/2} y2={H-PAD} stroke={isDark ? 'rgba(255,255,255,0.25)' : 'rgba(0,0,0,0.2)'} strokeWidth="1.5"/>

                                {/* 軸矢印 */}
                                {[[W-PAD, H/2, W-PAD+8, H/2, W-PAD, H/2-5, W-PAD, H/2+5],
                                  [PAD, H/2, PAD-8, H/2, PAD, H/2-5, PAD, H/2+5],
                                  [W/2, PAD, W/2, PAD-8, W/2-5, PAD, W/2+5, PAD],
                                  [W/2, H-PAD, W/2, H-PAD+8, W/2-5, H-PAD, W/2+5, H-PAD]
                                ].map(([x1,y1,tx,ty,lx,ly,rx,ry], ai) => (
                                    <polygon key={ai} points={`${tx},${ty} ${lx},${ly} ${rx},${ry}`}
                                        fill={isDark ? 'rgba(255,255,255,0.35)' : 'rgba(0,0,0,0.25)'}/>
                                ))}

                                {/* 軸ラベル */}
                                <text x={PAD + 8} y={H/2 - 10} fontSize="15" fill={isDark ? '#60a5fa' : '#2563eb'} fontWeight="700">{m.xLabel[0]}</text>
                                <text x={W - PAD - 8} y={H/2 - 10} fontSize="15" fill={isDark ? '#60a5fa' : '#2563eb'} fontWeight="700" textAnchor="end">{m.xLabel[1]}</text>
                                <text x={W/2 + 8} y={PAD + 18} fontSize="15" fill={isDark ? '#60a5fa' : '#2563eb'} fontWeight="700">{m.yLabel[1]}</text>
                                <text x={W/2 + 8} y={H - PAD - 8} fontSize="15" fill={isDark ? '#60a5fa' : '#2563eb'} fontWeight="700">{m.yLabel[0]}</text>

                                {/* 象限ラベル */}
                                {[
                                    [PAD + 12,   PAD + 20,   'start', m.quadrants[2]],
                                    [W - PAD - 12, PAD + 20, 'end',   m.quadrants[1]],
                                    [PAD + 12,   H - PAD - 24, 'start', m.quadrants[0]],
                                    [W - PAD - 12, H - PAD - 24, 'end', m.quadrants[3]]
                                ].map(([qx, qy, anchor, label], qi) => (
                                    label.split('\n').map((line, li) => (
                                        <text key={`${qi}-${li}`} x={qx} y={qy + li * 16}
                                            fontSize="11.5" textAnchor={anchor}
                                            fill={isDark ? 'rgba(156,163,175,0.55)' : 'rgba(107,114,128,0.55)'}
                                            fontStyle="italic">
                                            {line}
                                        </text>
                                    ))
                                ))}

                                {/* バブル */}
                                <g>
                                    {plotData.map((d, idx) => {
                                        const { x, y } = getXY(d);
                                        const { svgX, svgY } = toSVG(x, y);
                                        const r = bubbleR(d);
                                        const isSel = selected === d.theme;
                                        const isNear = nearItems.some(n => n.theme === d.theme);
                                        const isHov  = hoveredKw === d.theme;
                                        // 単色統一：選択・ホバー状態でアクセントを変える
                                        const bubbleBase   = '#f7d9a4';
                                        const bubbleSel    = isDark ? '#34d399' : '#10b981';
                                        const bubbleHov    = isDark ? '#93c5fd' : '#3b82f6';
                                        const bubbleColor  = isSel ? bubbleSel : isHov ? bubbleHov : bubbleBase;
                                        const alpha = selected ? (isSel || isNear ? 1 : 0.18) : (isHov ? 1 : 0.75);
                                        const label = d.theme.length > 10 ? d.theme.slice(0, 10) + '…' : d.theme;
                                        const fontSize = Math.max(9, Math.min(13.5, r * 0.72));
                                        // 上位5件 or 選択中は常時ラベル表示、それ以外はホバー時のみ
                                        const showAlwaysLabel = idx < 5 || isSel;
                                        const showHoverLabel  = !showAlwaysLabel && isHov;
                                        // ホバー用ラベルのバブル外表示設定
                                        const hoverLabelY  = -(r + 6);
                                        const hoverLabelFs = 11.5;
                                        const hoverLabelW  = Math.min(label.length * hoverLabelFs * 0.62 + 12, 130);
                                        return (
                                            <g key={d.theme}
                                                transform={`translate(${svgX},${svgY})`}
                                                onClick={() => setSelected(isSel ? null : d.theme)}
                                                onMouseEnter={() => setHoveredKw(d.theme)}
                                                onMouseLeave={() => setHoveredKw(null)}
                                                style={{cursor: 'pointer'}}>
                                                {isSel && (
                                                    <circle r={r + 5} fill="none" stroke={bubbleSel} strokeWidth="1.5" opacity="0">
                                                        <animate attributeName="r" values={`${r+3};${r+14}`} dur="1.5s" repeatCount="indefinite"/>
                                                        <animate attributeName="opacity" values="0.7;0" dur="1.5s" repeatCount="indefinite"/>
                                                    </circle>
                                                )}
                                                <circle r={r}
                                                    fill={bubbleColor} fillOpacity={alpha * 0.15}
                                                    stroke={bubbleColor} strokeWidth={isSel ? 2.5 : isNear ? 2 : 1.2}
                                                    strokeOpacity={alpha * 0.75}/>
                                                {showAlwaysLabel && (
                                                    <text textAnchor="middle" dominantBaseline="middle"
                                                        fontSize={fontSize} fontWeight={isSel ? 'bold' : '600'}
                                                        fill={isDark ? '#f1f5f9' : '#111827'} fillOpacity={Math.min(alpha + 0.2, 1)}
                                                        style={{pointerEvents:'none', userSelect:'none'}}>
                                                        {label}
                                                    </text>
                                                )}
                                                {showHoverLabel && (
                                                    <g style={{pointerEvents:'none'}}>
                                                        <rect
                                                            x={-hoverLabelW / 2} y={hoverLabelY - hoverLabelFs - 3}
                                                            width={hoverLabelW} height={hoverLabelFs + 8}
                                                            rx="4"
                                                            fill={isDark ? '#1e293b' : '#ffffff'}
                                                            stroke={bubbleHov} strokeWidth="1"
                                                            opacity="0.97"/>
                                                        <text textAnchor="middle" y={hoverLabelY - 2}
                                                            fontSize={hoverLabelFs} fontWeight="700"
                                                            fill={isDark ? '#f1f5f9' : '#111827'}
                                                            style={{userSelect:'none'}}>
                                                            {label}
                                                        </text>
                                                    </g>
                                                )}
                                            </g>
                                        );
                                    })}
                                </g>

                                {/* 凡例 削除済み（バブル色統一のため不要） */}
                            </svg>
                        </div>

                        {/* サイドパネル */}
                        <div className={`w-64 border-l overflow-y-auto flex-shrink-0 ${isDark ? 'border-gray-800 bg-[#1a1a1e]' : 'border-gray-200 bg-white'}`}>
                            {selItem ? (() => {
                                const { x, y } = getXY(selItem);
                                const quadrant = x > 0 && y > 0 ? 1 : x < 0 && y > 0 ? 2 : x < 0 && y < 0 ? 3 : 4;
                                const qMap = { 1: m.quadrants[1], 2: m.quadrants[2], 3: m.quadrants[0], 4: m.quadrants[3] };
                                const qLabel = (qMap[quadrant] || '').split('\n')[0];
                                const qSub   = (qMap[quadrant] || '').split('\n')[1];
                                const tvRecs = window.TV_META_DATA.filter(d =>
                                    d.theme && (d.theme.trim() === selItem.theme ||
                                    (d.tags || '').includes(selItem.theme.split(/[（(・]/)[0].trim()))
                                ).slice(0, 4);
                                return (
                                    <div className="p-4">
                                        <div className="flex items-start justify-between mb-2">
                                            <h3 className={`font-bold text-sm leading-tight ${isDark ? 'text-white' : 'text-gray-900'}`}>{selItem.theme}</h3>
