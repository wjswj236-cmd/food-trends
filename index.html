<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>トレンド検知AIエージェント (Gemini Powered)</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Markdown Parser -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- CryptoJS (For Encryption/Decryption) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

    <style>
        body {
            font-family: 'Noto Sans JP', sans-serif;
        }
        .markdown-body p { margin-bottom: 0.5em; }
        .markdown-body ul { list-style-type: disc; padding-left: 1.5em; margin-bottom: 0.5em; }
        .markdown-body ol { list-style-type: decimal; padding-left: 1.5em; margin-bottom: 0.5em; }
        .markdown-body h3 { font-size: 1.1em; font-weight: bold; margin-top: 1em; margin-bottom: 0.5em; }
        .markdown-body h4 { font-size: 1em; font-weight: bold; margin-top: 1em; margin-bottom: 0.5em; }
        
        /* カスタムスクロールバー */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(156, 163, 175, 0.5); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(107, 114, 128, 0.8); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // --- 設定・定数 ---
        // --- SECURITY CONFIG ---
        // 【重要】設定手順:
        // 1. このファイルをブラウザで開き、左下の設定(⚙️) > 「管理者設定」タブをクリック
        // 2. あなたのAPIキーと、任意の「パスワード」を入力して「暗号化文字列」を生成する
        // 3. 生成された文字列をコピーし、下の ENCRYPTED_API_KEY の "" の中に貼り付けて保存する
        const ENCRYPTED_API_KEY = "U2FsdGVkX19Dk9q5zmcqbJOFdAz7hujYS6+2ROFORAjkRLadyGn0L8Ge4eU8K7KPlzY/7FMX9LkbgjhjVX0o1Q==";

        const TV_META_DATA_INFO = `株式会社エム・データが提供する「TVメタデータ」は以下の4種類で構成されます。
1. 番組データ（番組放送内容）
2. CMデータ（広告出稿内容）
3. アイテムデータ（番組で紹介された商品情報）
4. スポットデータ（番組で紹介されたお店・宿・観光地等の情報）`;

        const SYSTEM_PROMPT = `あなたはTVメタデータを分析し、最新のトレンドを検知・解説する優秀なAIエージェントです。
ユーザーの指示に対して、ミス無く正確に集計・分析し、分かりやすく提示してください。
${TV_META_DATA_INFO}
これらのデータを総合的に推測・活用し、ユーザーの課題解決をサポートしてください。`;

        // --- ユーティリティ ---
        // iframeプレビュー環境等でのセキュリティエラーを回避するためのラッパー
        const safeStorage = {
            getItem: (key) => {
                try { return localStorage.getItem(key); } 
                catch (e) { return null; }
            },
            setItem: (key, value) => {
                try { localStorage.setItem(key, value); } 
                catch (e) { console.warn('Storage access is restricted in this environment.'); }
            }
        };

        // AIの回答から「提案プロンプト」を抽出する関数
        const parseMessageContent = (content) => {
            const suggestRegex = /### 提案プロンプト\n([\s\S]*)/;
            const match = content.match(suggestRegex);
            
            let mainText = content;
            let suggestions = [];
            
            if (match) {
                mainText = content.replace(match[0], '').trim();
                const lines = match[1].split('\n');
                suggestions = lines
                    .filter(line => line.trim().startsWith('*') || line.trim().startsWith('-'))
                    .map(line => line.replace(/^[\*\-]\s*\[?/, '').replace(/\]?$/, '').trim())
                    .filter(text => text.length > 0);
            }
            
            return { mainText, suggestions };
        };

        // --- コンポーネント ---

        // 1. サイドバー
        const Sidebar = ({ onNewChat, onOpenSettings, hasKey, theme }) => {
            return (
                <div className="w-64 flex-shrink-0 flex flex-col border-r border-gray-800 bg-[#1e1e20]">
                    <div className="p-5 border-b border-gray-800/50 flex items-center gap-3">
                        <div className="w-10 h-10 rounded-xl bg-blue-600 flex items-center justify-center shrink-0 shadow-lg shadow-blue-500/20">
                            <i className="ph ph-television text-white text-2xl"></i>
                        </div>
                        <h1 className="text-white font-bold text-base leading-tight">トレンド検知<br/>AIエージェント</h1>
                    </div>
                    <div className="p-4">
                        <button 
                            onClick={onNewChat}
                            className="w-full flex items-center justify-center gap-2 py-3 px-4 rounded-xl font-medium transition-colors bg-blue-600 hover:bg-blue-700 text-white"
                        >
                            <i className="ph ph-plus text-lg"></i>
                            新しい分析を開始
                        </button>
                    </div>
                    <div className="flex-1 overflow-y-auto px-4 py-2">
                        <div className="text-xs font-bold mb-3 text-gray-500">最近の分析</div>
                        <div className="p-3 rounded-lg text-sm cursor-pointer mb-2 truncate hover:bg-gray-800 text-gray-300">
                            <i className="ph ph-chat-teardrop mr-2"></i>スイーツの最新トレンド...
                        </div>
                    </div>
                    <div className="p-4 border-t border-gray-800/50">
                        <button 
                            onClick={onOpenSettings}
                            className={`w-full flex items-center gap-3 py-2 px-3 rounded-lg text-sm transition-colors ${
                                !hasKey ? 'text-red-400 hover:bg-red-400/10' : 'text-gray-300 hover:bg-gray-800'
                            }`}
                        >
                            <i className="ph ph-gear text-lg"></i>
                            設定 { !hasKey && <span className="w-2 h-2 rounded-full bg-red-500 ml-auto"></span> }
                        </button>
                    </div>
                </div>
            );
        };

        // 2. メインチャットエリア
        const ChatArea = ({ apiKey, theme }) => {
            const [messages, setMessages] = React.useState([{
                role: 'model', 
                content: 'こんにちは。TVメタデータを活用したトレンド検知エージェントです。\nどのようなテーマやキーワードについて分析しますか？\n\n入力に迷った場合は、キーワードを入力して「✨AIサポートで切り口を探す」を押してください。'
            }]);
            const [input, setInput] = React.useState('');
            const [isLoading, setIsLoading] = React.useState(false);
            const messagesEndRef = React.useRef(null);
            const isDark = theme === 'dark';

            const scrollToBottom = () => {
                messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
            };

            React.useEffect(() => {
                scrollToBottom();
            }, [messages]);

            // 通常のメッセージ送信（分析実行）
            const handleSend = async (textToSubmit = input) => {
                if (!textToSubmit.trim() || !apiKey) return;

                const userText = textToSubmit;
                setInput('');
                const newMessages = [...messages, { role: 'user', content: userText }];
                setMessages(newMessages);
                setIsLoading(true);

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            systemInstruction: { parts: [{ text: SYSTEM_PROMPT }] },
                            contents: newMessages.map(msg => ({
                                role: msg.role === 'model' ? 'model' : 'user',
                                parts: [{ text: msg.content }]
                            }))
                        })
                    });

                    const data = await response.json();
                    if (data.error) throw new Error(data.error.message);
                    
                    const aiResponse = data.candidates[0].content.parts[0].text;
                    setMessages(prev => [...prev, { role: 'model', content: aiResponse }]);
                } catch (error) {
                    setMessages(prev => [...prev, { role: 'model', content: `エラーが発生しました: ${error.message}` }]);
                } finally {
                    setIsLoading(false);
                }
            };

            // ★追加実装：対話型AIサポート機能
            const handleAISupport = async () => {
                if (!input.trim() || !apiKey) return;
                
                const queryText = input;
                setInput('');
                
                // ユーザーの意図をチャットに表示（AIサポートのリクエストであることを明示）
                setMessages(prev => [...prev, { 
                    role: 'user', 
                    content: `「${queryText}」について調べたいですが、分析の切り口を提案してください。` 
                }]);
                setIsLoading(true);

                // AIサポート専用のプロンプト
                const supportPrompt = `あなたはTVメタデータを活用するデータアナリストのサポートAIです。
ユーザーは以下のキーワードやテーマについて分析したいと考えていますが、具体的な分析の切り口や検索条件が定まっていません。

【ユーザーの入力】
"${queryText}"

${TV_META_DATA_INFO}

このデータを活用して「${queryText}」を分析するための、ユニークで有益な分析の切り口（アプローチ）を3つ提案してください。
ユーザーと対話しながら要件を固めるため、親しみやすいトーンで回答してください。

最後に、ユーザーがそのままクリックして次の指示（検索実行）として使える「具体的なプロンプト案（質問案）」を3つ、以下の形式で必ず出力してください。これ以外の余計な装飾はプロンプト部分に含めないでください。

### 提案プロンプト
* [プロンプト案1]
* [プロンプト案2]
* [プロンプト案3]`;

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ role: "user", parts: [{ text: supportPrompt }] }]
                        })
                    });

                    const data = await response.json();
                    if (data.error) throw new Error(data.error.message);
                    
                    const aiResponse = data.candidates[0].content.parts[0].text;
                    setMessages(prev => [...prev, { role: 'model', content: aiResponse }]);
                } catch (error) {
                    setMessages(prev => [...prev, { role: 'model', content: `エラーが発生しました: ${error.message}` }]);
                } finally {
                    setIsLoading(false);
                }
            };

            // キーボードのEnterで送信
            const handleKeyDown = (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    handleSend();
                }
            };

            return (
                <div className="flex-1 flex flex-col h-full relative">
                    {/* メッセージ履歴 */}
                    <div className="flex-1 overflow-y-auto p-4 sm:p-6 space-y-6">
                        {messages.map((msg, index) => {
                            const isUser = msg.role === 'user';
                            // サジェストチップのパース
                            const { mainText, suggestions } = parseMessageContent(msg.content);

                            return (
                                <div key={index} className={`flex ${isUser ? 'justify-end' : 'justify-start'}`}>
                                    <div className={`max-w-[85%] lg:max-w-[75%] rounded-2xl px-5 py-4 ${
                                        isUser 
                                            ? (isDark ? 'bg-blue-600 text-white' : 'bg-blue-600 text-white') 
                                            : (isDark ? 'bg-[#1e1e20] text-gray-200 border border-gray-800' : 'bg-white text-gray-800 border border-gray-200 shadow-sm')
                                    }`}>
                                        <div className="flex items-center gap-2 mb-2">
                                            <i className={`ph ${isUser ? 'ph-user' : 'ph-robot'} text-xl opacity-80`}></i>
                                            <span className="text-xs font-bold opacity-80">{isUser ? 'あなた' : 'AIアシスタント'}</span>
                                        </div>
                                        
                                        <div 
                                            className="markdown-body text-sm leading-relaxed"
                                            dangerouslySetInnerHTML={{ __html: marked.parse(mainText) }} 
                                        />

                                        {/* ★追加実装：サジェストチップのレンダリング */}
                                        {suggestions.length > 0 && (
                                            <div className={`mt-4 pt-4 border-t ${isDark ? 'border-gray-700' : 'border-gray-200'}`}>
                                                <p className={`text-xs font-bold mb-2 flex items-center gap-1 ${isDark ? 'text-purple-400' : 'text-purple-600'}`}>
                                                    <i className="ph ph-lightbulb"></i> 分析を実行する（クリック）
                                                </p>
                                                <div className="flex flex-col gap-2">
                                                    {suggestions.map((suggestion, idx) => (
                                                        <button
                                                            key={idx}
                                                            onClick={() => handleSend(suggestion)}
                                                            disabled={isLoading}
                                                            className={`text-left text-sm px-4 py-3 rounded-xl transition-all flex items-start gap-2 ${
                                                                isDark 
                                                                    ? 'bg-purple-900/20 hover:bg-purple-900/40 text-purple-200 border border-purple-800/50' 
                                                                    : 'bg-purple-50 hover:bg-purple-100 text-purple-700 border border-purple-200'
                                                            }`}
                                                        >
                                                            <i className="ph ph-magnifying-glass mt-0.5 shrink-0"></i>
                                                            <span className="leading-snug">{suggestion}</span>
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            );
                        })}
                        {isLoading && (
                            <div className="flex justify-start">
                                <div className={`max-w-[80%] rounded-2xl px-5 py-4 flex items-center gap-3 ${isDark ? 'bg-[#1e1e20] text-gray-200' : 'bg-white text-gray-800'}`}>
                                    <i className="ph ph-spinner animate-spin text-xl text-blue-500"></i>
                                    <span className="text-sm">分析・生成中...</span>
                                </div>
                            </div>
                        )}
                        <div ref={messagesEndRef} />
                    </div>

                    {/* 入力エリア */}
                    <div className={`p-4 sm:p-6 ${isDark ? 'bg-[#131314]' : 'bg-gray-50'}`}>
                        <div className={`max-w-4xl mx-auto rounded-2xl p-2 ${isDark ? 'bg-[#1e1e20] border border-gray-700 focus-within:border-blue-500' : 'bg-white border border-gray-300 focus-within:border-blue-500 shadow-sm'}`}>
                            <textarea
                                value={input}
                                onChange={(e) => setInput(e.target.value)}
                                onKeyDown={handleKeyDown}
                                placeholder="調べたいキーワードや分析の目的を入力してください（例：最近のスイーツのトレンド）"
                                className={`w-full max-h-48 min-h-[56px] bg-transparent resize-none outline-none p-3 text-sm ${isDark ? 'text-white placeholder-gray-500' : 'text-gray-900 placeholder-gray-400'}`}
                                rows="2"
                            />
                            <div className="flex items-center justify-between mt-2 px-2 pb-1">
                                {/* ★追加実装：AIサポートボタン */}
                                <button
                                    onClick={handleAISupport}
                                    disabled={isLoading || !input.trim()}
                                    className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm font-medium transition-colors ${
                                        isDark 
                                            ? 'text-purple-400 hover:bg-purple-500/10 disabled:opacity-30' 
                                            : 'text-purple-600 hover:bg-purple-50 disabled:opacity-30'
                                    }`}
                                    title="入力したキーワードについて、AIに分析の切り口を相談します"
                                >
                                    <i className="ph ph-magic-wand text-lg"></i>
                                    <span>AIサポートで切り口を探す</span>
                                </button>
                                
                                {/* 通常の送信ボタン */}
                                <button
                                    onClick={() => handleSend()}
                                    disabled={isLoading || !input.trim()}
                                    className={`flex items-center justify-center p-2.5 rounded-xl transition-all ${
                                        !input.trim() || isLoading
                                            ? (isDark ? 'bg-gray-800 text-gray-600' : 'bg-gray-200 text-gray-400')
                                            : 'bg-blue-600 text-white hover:bg-blue-700 shadow-md'
                                    }`}
                                >
                                    <i className="ph ph-paper-plane-right text-lg"></i>
                                </button>
                            </div>
                        </div>
                        {!apiKey && (
                            <p className="text-center text-xs text-red-500 mt-3">
                                <i className="ph ph-warning-circle mr-1"></i>
                                左下の「設定」からパスワードを入力してロックを解除してください
                            </p>
                        )}
                    </div>
                </div>
            );
        };

        // 3. APIキー設定モーダル
        const ApiKeyModal = ({ isOpen, onClose, onSave, theme, setTheme }) => {
            const [activeTab, setActiveTab] = React.useState('user');
            const [password, setPassword] = React.useState('');
            const [adminApiKey, setAdminApiKey] = React.useState('');
            const [adminPassword, setAdminPassword] = React.useState('');
            const [encryptedResult, setEncryptedResult] = React.useState('');
            const [errorMsg, setErrorMsg] = React.useState('');
            
            const isDark = theme === 'dark';

            React.useEffect(() => {
                if (isOpen) {
                    setPassword(safeStorage.getItem('tv_meta_password') || '');
                    setErrorMsg('');
                }
            }, [isOpen]);

            if (!isOpen) return null;

            const handleSaveUser = () => {
                if (!ENCRYPTED_API_KEY) {
                    setErrorMsg('システムに暗号化キーが設定されていません。管理者設定からキーを生成してソースコードに貼り付けてください。');
                    return;
                }
                try {
                    const bytes = CryptoJS.AES.decrypt(ENCRYPTED_API_KEY, password);
                    const decryptedKey = bytes.toString(CryptoJS.enc.Utf8);
                    
                    if (decryptedKey && decryptedKey.startsWith('AIza')) {
                        onSave(decryptedKey, password);
                        setErrorMsg('');
                    } else {
                        setErrorMsg('パスワードが間違っているか、キーが不正です。');
                    }
                } catch (e) {
                    setErrorMsg('復号化に失敗しました。パスワードを確認してください。');
                }
            };

            const handleEncrypt = () => {
                if (!adminApiKey || !adminPassword) {
                    setErrorMsg('APIキーとパスワード両方を入力してください。');
                    return;
                }
                try {
                    const encrypted = CryptoJS.AES.encrypt(adminApiKey, adminPassword).toString();
                    setEncryptedResult(encrypted);
                    setErrorMsg('');
                } catch (e) {
                    setErrorMsg('暗号化処理に失敗しました。');
                }
            };

            return (
                <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                    <div className={`w-full max-w-md rounded-2xl overflow-hidden shadow-xl ${isDark ? 'bg-[#1e1e20] text-gray-100 border border-gray-700' : 'bg-white text-gray-900'}`}>
                        {/* ヘッダーとタブ */}
                        <div className={`px-6 pt-6 pb-0 border-b ${isDark ? 'border-gray-700' : 'border-gray-200'}`}>
                            <div className="flex justify-between items-center mb-4">
                                <h2 className="text-xl font-bold flex items-center gap-2">
                                    <i className="ph ph-gear-six text-blue-500"></i>設定
                                </h2>
                                <button onClick={onClose} className="p-1 rounded-lg hover:bg-gray-500/20 transition-colors">
                                    <i className="ph ph-x text-xl"></i>
                                </button>
                            </div>
                            <div className="flex gap-4">
                                <button 
                                    onClick={() => {setActiveTab('user'); setErrorMsg('');}}
                                    className={`pb-3 text-sm font-bold border-b-2 transition-colors ${activeTab === 'user' ? 'border-blue-500 text-blue-500' : 'border-transparent text-gray-500 hover:text-gray-400'}`}
                                >
                                    ユーザー設定
                                </button>
                                <button 
                                    onClick={() => {setActiveTab('admin'); setErrorMsg('');}}
                                    className={`pb-3 text-sm font-bold border-b-2 transition-colors ${activeTab === 'admin' ? 'border-blue-500 text-blue-500' : 'border-transparent text-gray-500 hover:text-gray-400'}`}
                                >
                                    管理者設定
                                </button>
                            </div>
                        </div>
                        
                        <div className="p-6">
                            {errorMsg && (
                                <div className="mb-4 p-3 rounded-lg bg-red-500/10 border border-red-500/50 text-red-500 text-xs">
                                    {errorMsg}
                                </div>
                            )}

                            {activeTab === 'user' && (
                                <div className="space-y-4">
                                    <div>
                                        <label className={`block text-sm font-medium mb-2 ${isDark ? 'text-gray-300' : 'text-gray-700'}`}>
                                            パスワード
                                        </label>
                                        <input
                                            type="password"
                                            value={password}
                                            onChange={(e) => setPassword(e.target.value)}
                                            placeholder="管理者が設定したパスワードを入力"
                                            className={`w-full px-4 py-3 rounded-xl border outline-none transition-colors ${
                                                isDark 
                                                    ? 'bg-[#131314] border-gray-700 focus:border-blue-500' 
                                                    : 'bg-gray-50 border-gray-300 focus:border-blue-500'
                                            }`}
                                        />
                                        <p className={`text-xs mt-2 ${isDark ? 'text-gray-500' : 'text-gray-500'}`}>
                                            パスワードはブラウザのローカルストレージにのみ保存されます。
                                        </p>
                                    </div>

                                    <div className={`pt-4 border-t ${isDark ? 'border-gray-700' : 'border-gray-200'}`}>
                                        <label className={`block text-sm font-medium mb-3 ${isDark ? 'text-gray-300' : 'text-gray-700'}`}>
                                            外観テーマ
                                        </label>
                                        <div className="flex gap-3">
                                            <button 
                                                onClick={() => setTheme('light')}
                                                className={`flex-1 py-2 px-3 rounded-xl flex items-center justify-center gap-2 border transition-all ${
                                                    theme === 'light' 
                                                        ? 'border-blue-500 bg-blue-500/10 text-blue-600' 
                                                        : (isDark ? 'border-gray-700 hover:bg-gray-800' : 'border-gray-300 hover:bg-gray-100')
                                                }`}
                                            >
                                                <i className="ph ph-sun"></i> ライト
                                            </button>
                                            <button 
                                                onClick={() => setTheme('dark')}
                                                className={`flex-1 py-2 px-3 rounded-xl flex items-center justify-center gap-2 border transition-all ${
                                                    theme === 'dark' 
                                                        ? 'border-blue-500 bg-blue-500/10 text-blue-400' 
                                                        : (isDark ? 'border-gray-700 hover:bg-gray-800' : 'border-gray-300 hover:bg-gray-100')
                                                }`}
                                            >
                                                <i className="ph ph-moon"></i> ダーク
                                            </button>
                                        </div>
                                    </div>

                                    <div className="flex justify-end gap-3 mt-6">
                                        <button 
                                            onClick={onClose}
                                            className={`px-4 py-2 rounded-xl text-sm font-medium transition-colors ${
                                                isDark ? 'hover:bg-gray-800 text-gray-300' : 'hover:bg-gray-100 text-gray-600'
                                            }`}
                                        >
                                            キャンセル
                                        </button>
                                        <button 
                                            onClick={handleSaveUser}
                                            className="px-5 py-2 rounded-xl text-sm font-medium bg-blue-600 hover:bg-blue-700 text-white transition-colors shadow-lg shadow-blue-500/20"
                                        >
                                            保存・ロック解除
                                        </button>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'admin' && (
                                <div className="space-y-4">
                                    <div>
                                        <label className={`block text-sm font-medium mb-2 ${isDark ? 'text-gray-300' : 'text-gray-700'}`}>
                                            Gemini API Key
                                        </label>
                                        <input
                                            type="password"
                                            value={adminApiKey}
                                            onChange={(e) => setAdminApiKey(e.target.value)}
                                            placeholder="AIzaSy..."
                                            className={`w-full px-4 py-2 rounded-xl border outline-none text-sm transition-colors ${
                                                isDark ? 'bg-[#131314] border-gray-700 focus:border-blue-500' : 'bg-gray-50 border-gray-300 focus:border-blue-500'
                                            }`}
                                        />
                                    </div>
                                    <div>
                                        <label className={`block text-sm font-medium mb-2 ${isDark ? 'text-gray-300' : 'text-gray-700'}`}>
                                            任意のパスワード
                                        </label>
                                        <input
                                            type="text"
                                            value={adminPassword}
                                            onChange={(e) => setAdminPassword(e.target.value)}
                                            placeholder="利用者に共有するパスワード"
                                            className={`w-full px-4 py-2 rounded-xl border outline-none text-sm transition-colors ${
                                                isDark ? 'bg-[#131314] border-gray-700 focus:border-blue-500' : 'bg-gray-50 border-gray-300 focus:border-blue-500'
                                            }`}
                                        />
                                    </div>
                                    <button 
                                        onClick={handleEncrypt}
                                        className="w-full py-2 rounded-xl text-sm font-medium bg-purple-600 hover:bg-purple-700 text-white transition-colors"
                                    >
                                        暗号化文字列を生成
                                    </button>

                                    {encryptedResult && (
                                        <div className="mt-4">
                                            <label className={`block text-sm font-medium mb-2 ${isDark ? 'text-gray-300' : 'text-gray-700'}`}>
                                                生成された暗号化文字列 (ENCRYPTED_API_KEY に貼り付け)
                                            </label>
                                            <textarea
                                                readOnly
                                                value={encryptedResult}
                                                className={`w-full h-24 p-3 rounded-xl border outline-none text-xs font-mono break-all ${
                                                    isDark ? 'bg-[#131314] border-gray-700 text-gray-300' : 'bg-gray-50 border-gray-300 text-gray-700'
                                                }`}
                                                onClick={(e) => e.target.select()}
                                            />
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // 4. アプリルート
        const App = () => {
            const [apiKey, setApiKey] = React.useState('');
            const [isSettingsOpen, setIsSettingsOpen] = React.useState(false);
            const [theme, setTheme] = React.useState('dark');

            React.useEffect(() => {
                const storedTheme = safeStorage.getItem('tv_meta_theme');
                if (storedTheme) setTheme(storedTheme);
                else if (window.matchMedia('(prefers-color-scheme: light)').matches) setTheme('light');

                // 起動時のAPIキー復号チェック
                const storedPassword = safeStorage.getItem('tv_meta_password');
                if (storedPassword && ENCRYPTED_API_KEY) {
                    try {
                        const bytes = CryptoJS.AES.decrypt(ENCRYPTED_API_KEY, storedPassword);
                        const decryptedKey = bytes.toString(CryptoJS.enc.Utf8);
                        if (decryptedKey && decryptedKey.startsWith('AIza')) {
                            setApiKey(decryptedKey);
                        }
                    } catch (e) {
                        console.error("Auto decryption failed");
                    }
                }
            }, []);

            const handleSaveAuth = (key, password) => {
                setApiKey(key);
                safeStorage.setItem('tv_meta_password', password);
                setIsSettingsOpen(false);
            };

            const handleThemeChange = (newTheme) => {
                setTheme(newTheme);
                safeStorage.setItem('tv_meta_theme', newTheme);
            };

            return (
                <div className={`flex h-screen w-full overflow-hidden ${theme === 'dark' ? 'bg-[#131314] text-gray-100' : 'bg-gray-50 text-gray-900'}`}>
                    <Sidebar 
                        onNewChat={() => window.location.reload()} 
                        onOpenSettings={() => setIsSettingsOpen(true)}
                        hasKey={!!apiKey}
                        theme={theme}
                    />
                    <ChatArea 
                        apiKey={apiKey} 
                        theme={theme}
                    />
                    <ApiKeyModal 
                        isOpen={isSettingsOpen} 
                        onClose={() => setIsSettingsOpen(false)}
                        onSave={handleSaveAuth}
                        theme={theme}
                        setTheme={handleThemeChange}
                    />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
